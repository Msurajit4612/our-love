<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<link rel="stylesheet" href="style.css">

<style>
#popup{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:999;
}

#popup img{
max-width:90%;
max-height:85%;
border-radius:20px;
}

#popup span{
position:absolute;
top:20px;
right:30px;
font-size:40px;
cursor:pointer;
color:white;
}
</style>

</head>

<body>

<div class="container fade">

<div class="card">

<h1>📸 Our Beautiful Memories ❤️</h1>

<p>
Every picture reminds me how lucky I am to have you in my life.
</p>

<div class="gallery">

<img src="images/photo1.jpg" onclick="openImage(this.src)">

<img src="images/photo2.jpg" onclick="openImage(this.src)">

<img src="images/photo3.jpg" onclick="openImage(this.src)">

<img src="images/photo4.jpg" onclick="openImage(this.src)">

</div>

<br>

<button onclick="location.href='love.html'">
❤️ Next
</button>

</div>

</div>

<div id="popup">

<span onclick="closeImage()">&times;</span>

<img id="popupImg">

</div>

<script src="script.js"></script>

<script>

function openImage(src){

document.getElementById("popup").style.display="flex";

document.getElementById("popupImg").src=src;

}

function closeImage(){

document.getElementById("popup").style.display="none";

}

</script>

</body>
</html>
